<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>חברותא - ניהול קריאה</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>

    <div id="auth-section" class="container">
        <h1>חברותא</h1>
        <p>ניהול קריאת התורה הקהילתי</p>
        <button id="login-btn" class="main-btn">התחברות עם Google</button>
    </div>

    <div id="wizard-section" class="container hidden">
        <h2>הגדרה ראשונית</h2>
        <p>מהי פרשת בר המצווה שלך?</p>
        <select id="bar-mitzvah-select" class="full-input"></select>
        <button id="save-wizard" class="main-btn">שמור והמשך</button>
    </div>

    <div id="app-section" class="container hidden">
        <header class="dashboard-header">
            <span id="user-name-display"></span>
            <button id="admin-toggle" class="secondary-btn hidden">פאנל אדמין</button>
            <button id="logout-btn" class="secondary-btn">התנתק</button>
        </header>

        <section id="personal-card" class="card"></section>

        <h3>5 הפרשות הקרובות</h3>
        <div class="table-wrapper">
            <table>
                <thead>
                    <tr>
                        <th>תאריך</th>
                        <th>פרשה</th>
                        <th>קורא</th>
                        <th>סטטוס</th>
                        <th>פעולה</th>
                    </tr>
                </thead>
                <tbody id="readings-body"></tbody>
            </table>
        </div>

        <div id="admin-panel" class="card hidden" style="border-color: var(--danger); margin-top: 2rem;">
            <h3>ניהול קהילה (Admin)</h3>
            <div id="users-list"></div>
        </div>
    </div>

    <script type="module" src="app.js"></script>
</body>
</html>
